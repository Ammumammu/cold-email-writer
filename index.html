<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cold Email Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            background-color: #1e293b;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        h1, h2 {
            margin-top: 0;
        }
        .button {
            background-color: #6366f1;
            color: #ffffff;
            border: none;
            padding: 1rem 2rem;
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 1rem;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #5550bd;
        }
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 0.75rem;
            margin-top: 0.5rem;
            border-radius: 4px;
            border: 1px solid #374151;
            background-color: #374151;
            color: #ffffff;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 0.75rem;
            margin-top: 0.5rem;
            border-radius: 4px;
            border: 1px solid #374151;
            background-color: #374151;
            color: #ffffff;
        }
        .viral {
            font-size: 0.8rem;
            margin-top: 1rem;
            color: #94a3b8;
        }
        .paywall {
            text-align: center;
        }
        .paywall h2 {
            color: #ef4444;
        }
        .paywall .button {
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/babel-standalone@6.26.0/babel.min.js"></script>
<script type="text/babel">
    const CONFIG = {
        GROQ_KEY: 'CONFIG.GROQ_KEY',
        SUPABASE_ANON_KEY: 'your-supabase-anon-key',
        SUPABASE_URL: 'https://your-supabase-url.supabase.co'
    };

    const posthog = {
        capture: (event) => {
            console.log('PostHog event:', event);
        }
    };

    const supabase = {
        from: (table) => ({
            insert: (data) => {
                console.log('Supabase insert:', table, data);
            }
        })
    };

    const AI_ENDPOINT = 'https://api.groq.com/v1/inference';

    const Landing = ({ openTool }) => (
        <div className="container">
            <h1>Cold Emails Fail</h1>
            <h2>Sales teams use AI for instant results</h2>
            <p>Type prompt (5 sec) → AI suggests email (10 sec) → Get response (instant)</p>
            <button className="button" onClick={openTool}>Write Smarter</button>
        </div>
    );

    const Tool = ({ openPaywall, usesRemaining }) => {
        const [prompt, setPrompt] = React.useState('');
        const [email, setEmail] = React.useState('');
        const [loading, setLoading] = React.useState(false);

        const handleGenerateEmail = async () => {
            setLoading(true);
            posthog.capture('tool_used');
            const response = await fetch(AI_ENDPOINT, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${CONFIG.GROQ_KEY}`
                },
                body: JSON.stringify({
                    model: 'llama3-70b',
                    prompt: prompt,
                    max_tokens: 200
                })
            });
            const data = await response.json();
            setEmail(data.choices[0].text || 'Failed to generate email.');
            setLoading(false);
            if (usesRemaining <= 1) {
                openPaywall();
            }
        };

        return (
            <div className="container">
                <h1>Write Your Cold Email</h1>
                <input type="text" placeholder="Enter your prompt here..." value={prompt} onChange={(e) => setPrompt(e.target.value)} />
                <button className="button" onClick={handleGenerateEmail} disabled={loading}>
                    {loading ? 'Generating...' : 'Generate Email'}
                </button>
                {email && (
                    <div>
                        <textarea value={email} readOnly />
                        <div className="viral">Generated by Cold Email Pro — cold-email-writer.vercel.app</div>
                    </div>
                )}
            </div>
        );
    };

    const Paywall = ({ captureEmail }) => {
        const [email, setEmail] = React.useState('');
        const [submitted, setSubmitted] = React.useState(false);

        const handleSubmit = async () => {
            posthog.capture('email_captured');
            captureEmail(email);
            setSubmitted(true);
        };

        return (
            <div className="paywall container">
                <h2>Free limit reached!</h2>
                <p>Get 3 more free uses by entering your email below.</p>
                {!submitted ? (
                    <>
                        <input type="email" placeholder="Enter your email..." value={email} onChange={(e) => setEmail(e.target.value)} />
                        <button className="button" onClick={handleSubmit} disabled={!email}>Get Free Uses</button>
                    </>
                ) : (
                    <p>Thank you! 3 free uses have been added to your account.</p>
                )}
                <p>Or <a href="https://buy.stripe.com/placeholder-cold-email-writer" target="_blank" rel="noopener noreferrer" onClick={() => posthog.capture('payment_clicked')}>subscribe now</a> for $9/mo to get unlimited access.</p>
            </div>
        );
    };

    const App = () => {
        const [view, setView] = React.useState('landing');
        const [usesRemaining, setUsesRemaining] = React.useState(2);
        const [freeUses, setFreeUses] = React.useState(0);

        React.useEffect(() => {
            posthog.capture('tool_opened');
        }, []);

        const openTool = () => {
            setView('tool');
        };

        const openPaywall = () => {
            posthog.capture('free_limit_hit');
            setView('paywall');
        };

        const captureEmail = (email) => {
            supabase.from('leads').insert({ email, free_uses: 3 });
            setFreeUses(freeUses + 3);
        };

        return (
            <div>
                {view === 'landing' && <Landing openTool={openTool} />}
                {view === 'tool' && <Tool openPaywall={openPaywall} usesRemaining={usesRemaining + freeUses} />}
                {view === 'paywall' && <Paywall captureEmail={captureEmail} />}
            </div>
        );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
